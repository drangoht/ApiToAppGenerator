name: Docker CI / CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check & build (Next.js)
        run: npm run build

      - name: Run Vitest Suite
        run: npm run test

  # ── Job 2: Build & push Docker image (only on master push) ─────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            drangoht/apivolt:latest
            drangoht/apivolt:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ── Job 3: Deploy to production server via SSH ──────────────────────────────
  # Secrets required (Settings → Secrets → Actions):
  #   SSH_HOST         — server hostname or IP
  #   SSH_USER         — SSH login user
  #   SSH_PRIVATE_KEY  — contents of ~/.ssh/id_rsa
  #   SSH_DEPLOY_PATH  — path containing docker-compose.yml on the server
  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.SSH_DEPLOY_PATH }}
            sudo docker-compose pull
            sudo docker-compose up -d --remove-orphans
            sudo docker image prune -f

